name: Download Direct Link

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'لینک مستقیم فایل'
        required: true
      filename:
        description: 'اسم فایل خروجی (مثلاً video.mp4)'
        required: true
        default: 'downloaded_file'

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download file from direct link
        run: |
          curl -L -o "${{ github.event.inputs.filename }}" "${{ github.event.inputs.url }}"

      - name: Check file info
        run: |
          ls -lh
          echo "Download completed"

      - name: Split into 90MB parts
        run: |
          split -b 90M -d "${{ github.event.inputs.filename }}" part_

      - name: Upload parts
        uses: actions/upload-artifact@v4
        with:
          name: file-parts
          path: part_*
          retention-days: 3      
