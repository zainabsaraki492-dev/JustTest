name: Download YouTube 720p

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'لینک ویدیوی یوتیوب'
        required: true

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install yt-dlp
        run: |
          curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o yt-dlp
          chmod +x yt-dlp

      - name: Download 720p video with audio
        run: |
          ./yt-dlp \
            -f "bestvideo[height<=720]+bestaudio/best[height<=720]" \
            --merge-output-format mp4 \
            --output "video.mp4" \
            "${{ github.event.inputs.url }}"

      - name: Split into 90MB parts
        run: |
          split -b 90M -d video.mp4 part_

      - name: Upload parts
        uses: actions/upload-artifact@v4
        with:
          name: video-parts
          path: part_*
          retention-days: 3
