name: Download to Repository

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'لینک مستقیم فایل'
        required: true
      filename:
        description: 'اسم فایل با پسوند (مثلاً video.mp4)'
        required: true
        default: 'video.mp4'

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download file
        run: |
          curl -L -o "${{ github.event.inputs.filename }}" "${{ github.event.inputs.url }}"

      - name: Split into 20MB parts
        run: |
          mkdir -p parts
          split -b 20M -d "${{ github.event.inputs.filename }}" parts/part_

      - name: Commit parts to repository
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add parts/
          git commit -m "Add file parts" || echo "No changes"
          git push      
