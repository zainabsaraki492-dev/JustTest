name: YouTube Downloader

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'لینک ویدیوی یوتیوب'
        required: true

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Install yt-dlp and dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq nodejs npm
          curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o yt-dlp
          chmod +x yt-dlp

      - name: Download from YouTube
        run: |
          ./yt-dlp \
            --js-runtimes node \
            --extractor-args "youtube:player_client=android_vr,web" \
            -f "bestvideo[height<=720]+bestaudio/best[height<=720]/best" \
            --merge-output-format mp4 \
            --output "video.mp4" \
            --no-playlist \
            "${{ github.event.inputs.url }}"

      - name: Split into 45MB parts
        run: |
          rm -rf yt-parts
          mkdir -p yt-parts
          split -b 45M -d video.mp4 yt-parts/part_

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git checkout -b "youtube-${GITHUB_RUN_ID}" 2>/dev/null || git checkout "youtube-${GITHUB_RUN_ID}"
          git add yt-parts/
          git commit -m "Add YouTube video parts" || echo "No changes"
          git push origin "youtube-${GITHUB_RUN_ID}" --force
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
